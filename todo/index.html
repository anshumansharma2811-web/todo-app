<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌊 Ocean Todo App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #006994 0%, #0077b6 20%, #00b4d8 40%, #90e0ef 60%, #caf0f8 80%, #e8f5e9 100%);
            position: relative;
        }

        .container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(30px);
            border-radius: 30px;
            padding: 35px;
            max-width: 750px;
            width: 100%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 30px 80px rgba(0, 20, 40, 0.5);
            max-height: 95vh;
            overflow-y: auto;
        }

        h1 {
            color: #fff;
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 25px;
            text-shadow: 0 4px 30px rgba(0, 20, 40, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        h1 span {
            background: rgba(255, 255, 255, 0.3);
            padding: 0 18px;
            border-radius: 50px;
            font-size: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        /* ===== IMPROVED INPUT AREA ===== */
        .input-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .input-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .input-row:first-child {
            flex: 1;
        }

        #taskInput {
            flex: 1;
            padding: 16px 22px;
            border: none;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.3);
            color: #1a2a3a;
            font-size: 1rem;
            font-weight: 500;
            border: 2px solid rgba(255, 255, 255, 0.4);
            outline: none;
            min-width: 200px;
            transition: all 0.3s ease;
        }

        #taskInput::placeholder {
            color: rgba(0, 50, 80, 0.6);
        }

        #taskInput:focus {
            background: rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 30px rgba(144, 224, 239, 0.2);
        }

        .datetime-group {
            display: flex;
            gap: 10px;
            flex: 1;
            min-width: 250px;
        }

        #taskDate,
        #taskTime {
            flex: 1;
            padding: 16px 18px;
            border: none;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.3);
            color: #1a2a3a;
            font-size: 0.9rem;
            font-weight: 500;
            border: 2px solid rgba(255, 255, 255, 0.4);
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 0;
        }

        #taskDate::-webkit-calendar-picker-indicator,
        #taskTime::-webkit-calendar-picker-indicator {
            filter: invert(0.3);
            cursor: pointer;
        }

        #taskDate:focus,
        #taskTime:focus {
            background: rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.8);
        }

        /* ===== ADD BUTTON - SEPARATE ROW ===== */
        .add-button-row {
            display: flex;
            justify-content: flex-end;
            margin-top: 4px;
        }

        #addBtn {
            padding: 16px 50px;
            background: rgba(255, 255, 255, 0.35);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 18px;
            color: #0a2a3a;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 200px;
            letter-spacing: 0.5px;
        }

        #addBtn:hover {
            background: rgba(255, 255, 255, 0.55);
            transform: translateY(-3px);
            box-shadow: 0 15px 50px rgba(0, 20, 40, 0.3);
            border-color: rgba(255, 255, 255, 0.7);
        }

        #addBtn:active {
            transform: scale(0.95);
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 22px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            color: #fff;
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: rgba(255, 255, 255, 0.4);
            color: #0a1a2a;
            border-color: rgba(255, 255, 255, 0.7);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 22px;
            margin-bottom: 18px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            color: #0a1a2a;
            font-size: 0.9rem;
            font-weight: 600;
            flex-wrap: wrap;
            gap: 8px;
        }

        .stats .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stats .count-badge {
            background: rgba(255, 255, 255, 0.4);
            padding: 2px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #clearAllBtn {
            background: rgba(255, 107, 107, 0.25);
            border: 2px solid rgba(255, 107, 107, 0.25);
            padding: 8px 22px;
            border-radius: 50px;
            color: #fff;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        #clearAllBtn:hover {
            background: rgba(255, 107, 107, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 107, 107, 0.2);
        }

        #todoList {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }

        #todoList::-webkit-scrollbar {
            width: 6px;
        }
        #todoList::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        #todoList::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 18px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            transition: all 0.3s ease;
            flex-wrap: wrap;
        }

        .todo-item:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateX(6px);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .todo-item input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #0077b6;
            flex-shrink: 0;
            transition: transform 0.2s ease;
        }

        .todo-item input[type="checkbox"]:hover {
            transform: scale(1.15);
        }

        .todo-item .task-info {
            flex: 1;
            min-width: 150px;
        }

        .todo-item .task-text {
            font-size: 1rem;
            color: #0a1a2a;
            font-weight: 600;
            word-break: break-word;
        }

        .todo-item .task-meta {
            font-size: 0.75rem;
            color: rgba(0, 40, 60, 0.8);
            display: flex;
            gap: 14px;
            margin-top: 5px;
            flex-wrap: wrap;
            font-weight: 500;
        }

        .todo-item .task-meta .overdue {
            color: #d32f2f;
            font-weight: 700;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .todo-item.completed .task-text {
            text-decoration: line-through;
            color: rgba(0, 40, 60, 0.4);
        }

        .todo-item.completed {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .task-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .reminder-btn {
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: #8a6d00;
            padding: 8px 14px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .reminder-btn:hover {
            background: rgba(255, 215, 0, 0.35);
            transform: scale(1.05);
        }

        .reminder-btn.active {
            background: rgba(255, 215, 0, 0.35);
            border-color: rgba(255, 215, 0, 0.4);
        }

        .delete-btn {
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid rgba(255, 107, 107, 0.1);
            color: rgba(200, 50, 50, 0.8);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 14px;
            border-radius: 14px;
            transition: all 0.3s ease;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            background: rgba(255, 107, 107, 0.3);
            color: #d32f2f;
            transform: rotate(90deg) scale(1.1);
        }

        .empty-message {
            text-align: center;
            padding: 50px 20px;
            color: rgba(0, 40, 60, 0.7);
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            border: 2px dashed rgba(255, 255, 255, 0.2);
        }

        .empty-message span {
            font-size: 4rem;
            display: block;
            margin-bottom: 15px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: rgba(0, 20, 40, 0.9);
            backdrop-filter: blur(20px);
            color: #fff;
            padding: 18px 35px;
            border-radius: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            font-size: 0.95rem;
            max-width: 90%;
            text-align: center;
            font-weight: 500;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            color: rgba(0, 40, 60, 0.4);
            font-size: 0.7rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 18px;
            letter-spacing: 1px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 650px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .input-row {
                flex-direction: column;
            }

            .datetime-group {
                flex-direction: column;
                min-width: auto;
            }

            #taskDate,
            #taskTime {
                width: 100%;
            }

            .add-button-row {
                justify-content: stretch;
            }

            #addBtn {
                max-width: 100%;
                padding: 16px 20px;
            }

            .todo-item {
                flex-direction: column;
                align-items: stretch;
            }

            .task-actions {
                justify-content: flex-end;
                margin-top: 8px;
            }

            .stats {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
                gap: 6px;
            }

            .stats .stat-item {
                justify-content: center;
            }

            .filters {
                justify-content: center;
            }

            .filter-btn {
                padding: 8px 16px;
                font-size: 0.75rem;
            }
        }

        @media (min-width: 651px) and (max-width: 900px) {
            .input-row {
                flex-wrap: wrap;
            }

            .datetime-group {
                min-width: 200px;
            }

            #addBtn {
                max-width: 150px;
            }
        }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <div class="container">
        <h1>
            🌊 Ocean Tasks
            <span id="taskCounter">0</span>
        </h1>

        <!-- ===== IMPROVED INPUT LAYOUT ===== -->
        <div class="input-area">
            <!-- Row 1: Task input + Date + Time -->
            <div class="input-row">
                <input type="text" id="taskInput" placeholder="What's on your mind? 🌊">
                <div class="datetime-group">
                    <input type="date" id="taskDate">
                    <input type="time" id="taskTime">
                </div>
            </div>

            <!-- Row 2: Add Button (separate, right-aligned) -->
            <div class="add-button-row">
                <button id="addBtn">➕ Add Task</button>
            </div>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">📋 All</button>
            <button class="filter-btn" data-filter="pending">⏳ Pending</button>
            <button class="filter-btn" data-filter="completed">✅ Done</button>
            <button class="filter-btn" data-filter="today">📆 Today</button>
            <button class="filter-btn" data-filter="overdue">⚠️ Overdue</button>
        </div>

        <div class="stats">
            <span class="stat-item">📊 Total: <span class="count-badge" id="taskCount">0</span></span>
            <span class="stat-item">⏳ Pending: <span class="count-badge" id="pendingCount">0</span></span>
            <span class="stat-item">🔔 Reminders: <span class="count-badge" id="reminderCount">0</span></span>
            <button id="clearAllBtn">🗑️ Clear All</button>
        </div>

        <ul id="todoList"></ul>

        <div class="footer">✦ click checkbox · set reminders · filter tasks ✦</div>
    </div>

    <script>
        // DOM Elements
        const todoList = document.getElementById('todoList');
        const taskInput = document.getElementById('taskInput');
        const taskDate = document.getElementById('taskDate');
        const taskTime = document.getElementById('taskTime');
        const addBtn = document.getElementById('addBtn');
        const taskCount = document.getElementById('taskCount');
        const pendingCount = document.getElementById('pendingCount');
        const reminderCount = document.getElementById('reminderCount');
        const taskCounter = document.getElementById('taskCounter');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const toast = document.getElementById('toast');
        const filterBtns = document.querySelectorAll('.filter-btn');

        let tasks = [];
        let currentFilter = 'all';
        let toastTimeout = null;

        // Load tasks
        function loadTasks() {
            try {
                const stored = localStorage.getItem('oceanTasks');
                if (stored) tasks = JSON.parse(stored);
            } catch (e) { tasks = []; }
        }

        // Save tasks
        function saveTasks() {
            localStorage.setItem('oceanTasks', JSON.stringify(tasks));
        }

        // Show toast
        function showToast(message, duration = 3000) {
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), duration);
        }

        // Add task
        function addTask() {
            const text = taskInput.value.trim();
            if (text === '') {
                showToast('⚠️ Please enter a task!', 2000);
                taskInput.style.borderColor = '#ff6b6b';
                setTimeout(() => {
                    taskInput.style.borderColor = 'rgba(255, 255, 255, 0.4)';
                }, 1500);
                return;
            }

            let dueDate = null;
            if (taskDate.value) {
                let dateStr = taskDate.value;
                if (taskTime.value) dateStr += 'T' + taskTime.value;
                dueDate = new Date(dateStr).toISOString();
            }

            tasks.push({
                text: text,
                completed: false,
                dueDate: dueDate,
                reminder: false,
                reminded: false,
                overdue: false
            });

            taskInput.value = '';
            taskDate.value = '';
            taskTime.value = '';
            taskInput.focus();

            saveTasks();
            render();
            showToast('✅ Task added successfully!');
        }

        // Toggle task
        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            if (tasks[index].completed) tasks[index].reminded = true;
            saveTasks();
            render();
            showToast(tasks[index].completed ? '✅ Task completed!' : '🔄 Task reopened');
        }

        // Toggle reminder
        function toggleReminder(index) {
            tasks[index].reminder = !tasks[index].reminder;
            if (tasks[index].reminder && !tasks[index].dueDate) {
                showToast('⚠️ Set a due date first!', 2000);
                tasks[index].reminder = false;
                saveTasks();
                render();
                return;
            }
            if (tasks[index].reminder) {
                tasks[index].reminded = false;
                showToast('🔔 Reminder set for "' + tasks[index].text + '"');
                if ('Notification' in window && Notification.permission === 'default') {
                    Notification.requestPermission();
                }
            } else {
                showToast('🔕 Reminder removed');
            }
            saveTasks();
            render();
        }

        // Delete task
        function deleteTask(index) {
            const taskText = tasks[index].text;
            tasks.splice(index, 1);
            saveTasks();
            render();
            showToast('🗑️ "' + taskText + '" deleted');
        }

        // Clear all
        function clearAll() {
            if (tasks.length === 0) return;
            if (confirm('Delete all tasks?')) {
                tasks = [];
                saveTasks();
                render();
                showToast('🗑️ All tasks cleared');
            }
        }

        // Set filter
        function setFilter(filter) {
            currentFilter = filter;
            filterBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            render();
        }

        // Check overdue
        function checkOverdue() {
            const now = new Date();
            tasks.forEach(task => {
                if (!task.completed && task.dueDate) {
                    task.overdue = new Date(task.dueDate) < now;
                }
            });
        }

        // Render
        function render() {
            todoList.innerHTML = '';
            checkOverdue();

            let filtered = tasks;
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            switch (currentFilter) {
                case 'pending':
                    filtered = tasks.filter(t => !t.completed);
                    break;
                case 'completed':
                    filtered = tasks.filter(t => t.completed);
                    break;
                case 'today':
                    filtered = tasks.filter(t => {
                        if (!t.dueDate) return false;
                        const d = new Date(t.dueDate);
                        d.setHours(0, 0, 0, 0);
                        return d.getTime() === today.getTime();
                    });
                    break;
                case 'overdue':
                    filtered = tasks.filter(t => t.overdue && !t.completed);
                    break;
            }

            // Update counters
            const total = tasks.length;
            const pending = tasks.filter(t => !t.completed).length;
            const reminders = tasks.filter(t => t.reminder && !t.completed).length;
            taskCount.textContent = total;
            pendingCount.textContent = pending;
            reminderCount.textContent = reminders;
            taskCounter.textContent = total;

            // Empty state
            if (filtered.length === 0) {
                const msgs = {
                    'all': 'No tasks yet. Dive in! 🌊',
                    'today': 'No tasks for today 🏖️',
                    'overdue': 'No overdue tasks 🎉'
                };
                todoList.innerHTML =
                    `<div class="empty-message"><span>🐠</span>${msgs[currentFilter] || 'No tasks found'}</div>`;
                return;
            }

            // Render tasks
            filtered.forEach((task) => {
                const index = tasks.indexOf(task);
                const li = document.createElement('li');
                li.className = 'todo-item' + (task.completed ? ' completed' : '');

                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.checked = task.completed;
                cb.addEventListener('change', () => toggleTask(index));

                const info = document.createElement('div');
                info.className = 'task-info';

                const textSpan = document.createElement('span');
                textSpan.className = 'task-text';
                textSpan.textContent = task.text;

                const meta = document.createElement('div');
                meta.className = 'task-meta';
                if (task.dueDate) {
                    const due = new Date(task.dueDate);
                    meta.innerHTML = `<span>📅 ${due.toLocaleString()}</span>`;
                    if (task.overdue && !task.completed) {
                        meta.innerHTML += ` <span class="overdue">⚠️ Overdue</span>`;
                    }
                }
                if (task.reminder) {
                    meta.innerHTML += ` <span>🔔 Reminder set</span>`;
                }

                info.appendChild(textSpan);
                info.appendChild(meta);

                const actions = document.createElement('div');
                actions.className = 'task-actions';

                const remBtn = document.createElement('button');
                remBtn.className = 'reminder-btn' + (task.reminder ? ' active' : '');
                remBtn.textContent = task.reminder ? '🔔 On' : '🔕 Off';
                remBtn.addEventListener('click', () => toggleReminder(index));

                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.textContent = '✕';
                delBtn.addEventListener('click', () => deleteTask(index));

                actions.appendChild(remBtn);
                actions.appendChild(delBtn);

                li.appendChild(cb);
                li.appendChild(info);
                li.appendChild(actions);
                todoList.appendChild(li);
            });
        }

        // Event listeners
        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addTask();
        });
        clearAllBtn.addEventListener('click', clearAll);
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => setFilter(btn.dataset.filter));
        });

        // Init
        loadTasks();
        render();
        taskInput.focus();

        // Check reminders every 30 seconds
        setInterval(() => {
            const now = new Date();
            tasks.forEach(task => {
                if (!task.completed && task.reminder && task.dueDate) {
                    const due = new Date(task.dueDate);
                    const diff = due - now;
                    if (diff > 0 && diff < 3600000 && !task.reminded) {
                        if ('Notification' in window && Notification.permission === 'granted') {
                            new Notification('🌊 Ocean Reminder', {
                                body: '"' + task.text + '" is due soon!',
                                icon: '🌊'
                            });
                        }
                        showToast('🔔 "' + task.text + '" is due soon!');
                        task.reminded = true;
                        saveTasks();
                    }
                }
            });
        }, 30000);

        console.log('✅ Ocean Todo App is ready!');
    </script>

</body>
</html>
